<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de ROI — Manual × com IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #0a0d10;
    --card:      #121619;
    --field:     #1b2024;
    --field-br:  #2a3036;
    --line:      #262c31;
    --ink:       #e8edf0;
    --muted:     #7b868f;
    --accent:    #9d80d6;   /* roxo claro p/ leitura no escuro */
    --accent-dim:#7660a9;   /* roxo da marca */
    --gold:      #fdc609;   /* amarelo da marca */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px;
    -webkit-font-smoothing:antialiased;
  }

  .card{
    width:100%;
    max-width:660px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:30px 30px 32px;
    box-shadow:0 0 0 1px rgba(0,0,0,.4), 0 24px 60px -20px rgba(0,0,0,.7);
    position:relative;
    overflow:hidden;
  }
  /* faixa verde no topo */
  .card::before{
    content:"";
    position:absolute;
    top:0;left:0;right:0;
    height:3px;
    background:linear-gradient(90deg, var(--accent-dim) 0%, var(--accent) 45%, var(--gold) 100%);
  }


  .brand{ display:flex; align-items:center; gap:14px; margin-bottom:22px; }
  .brand img{ height:30px; width:auto; display:block; }
  .eyebrow{
    font-size:11.5px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:700;
    margin-bottom:24px;
  }

  /* inputs grid */
  .inputs{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px 22px;
  }
  .field label{
    display:block;
    font-size:13px;
    line-height:1.45;
    color:var(--muted);
    margin-bottom:10px;
    min-height:38px;
  }
  .field .ctrl{
    position:relative;
  }
  .field input{
    width:100%;
    background:var(--field);
    border:1px solid var(--field-br);
    border-radius:10px;
    color:var(--ink);
    font-family:inherit;
    font-size:24px;
    font-weight:800;
    padding:14px 16px;
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .field input.accent{ color:var(--accent); }
  .field input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(157,128,214,.18);
  }
  .field .suffix{
    position:absolute;
    right:16px;top:50%;
    transform:translateY(-50%);
    font-size:13px;
    color:var(--muted);
    pointer-events:none;
  }

  /* base anual line */
  .base{
    margin:22px 0 4px;
    font-size:13px;
    color:var(--muted);
    line-height:1.7;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:6px 14px;
  }
  .base .chip{
    display:inline-flex;
    align-items:center;
    gap:7px;
  }
  .base .dot{ color:var(--field-br); }
  .base b{ color:var(--ink); font-weight:700; }
  .base .mini{
    width:62px;
    background:var(--field);
    border:1px solid var(--field-br);
    border-radius:7px;
    color:var(--ink);
    font-family:inherit;
    font-weight:700;
    font-size:13px;
    padding:4px 8px;
    outline:none;
  }
  .base .mini.w-narrow{ width:44px; }
  .base .mini:focus{ border-color:var(--accent); }

  hr{
    border:0;
    border-top:1px solid var(--line);
    margin:20px 0 6px;
  }

  /* results */
  .results{ margin-top:14px; }
  .row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:16px;
    padding:9px 0;
    font-size:18px;
  }
  .row .k{ color:var(--ink); }
  .row .v{ font-weight:700; white-space:nowrap; }
  .row.muted .k{ color:var(--ink); }
  .row.highlight .k{ color:var(--gold); font-weight:700; }
  .row.highlight .v{ color:var(--gold); }
  .row.total{ padding-top:14px; }
  .row.total .k{ color:var(--accent); font-weight:800; font-size:19px; }
  .row.total .v{ color:var(--accent); font-weight:800; font-size:28px; }

  .footnote{
    margin-top:18px;
    font-size:11.5px;
    color:var(--muted);
    line-height:1.6;
  }

  @media (max-width:540px){
    .card{ padding:24px 18px 26px; }
    .inputs{ grid-template-columns:1fr; gap:14px; }
    .field label{ min-height:0; }
    .row{ font-size:16px; }
    .row.total .v{ font-size:24px; }
  }
</style>
</head>

    <div class="eyebrow">Calculadora de ROI — Manual × com IA</div>

    <section class="inputs">
      <div class="field">
        <label>Horas por execução<br>— antes da IA</label>
        <div class="ctrl">
          <input id="antes" type="text" inputmode="decimal" value="5" aria-label="Horas por execução antes da IA">
        </div>
      </div>
      <div class="field">
        <label>Horas por execução<br>— depois da IA</label>
        <div class="ctrl">
          <input id="depois" type="text" inputmode="decimal" class="accent" value="0,25" aria-label="Horas por execução depois da IA">
        </div>
      </div>
    </section>

    <div class="base">
      <span class="chip">Base anual:
        <input id="execucoes" class="mini" type="text" inputmode="numeric" value="48" aria-label="Execuções por ano"> execuções/ano
      </span>
      <span class="dot">·</span>
      <span class="chip">custo R$
        <input id="custo" class="mini" type="text" inputmode="numeric" value="80" aria-label="Custo por hora"> /h
      </span>
      <span class="dot">·</span>
      <span class="chip">jornada
        <input id="jornada" class="mini w-narrow" type="text" inputmode="numeric" value="8" aria-label="Horas por dia"> h/dia
      </span>
    </div>

    <hr>

    <section class="results">
      <div class="row"><span class="k">Manual</span><span class="v" id="r-manual">240 h/ano</span></div>
      <div class="row"><span class="k">Com IA</span><span class="v" id="r-ia">12 h/ano</span></div>
      <div class="row"><span class="k">Redução de tempo</span><span class="v" id="r-reducao">95%</span></div>
      <div class="row highlight"><span class="k">Economia</span><span class="v" id="r-economia">228 h/ano</span></div>
      <div class="row"><span class="k">Equivale a</span><span class="v" id="r-dias">≈ 29 dias úteis</span></div>
      <div class="row total"><span class="k">Valor economizado</span><span class="v" id="r-valor">R$ 18.240/ano</span></div>
    </section>

    <p class="footnote" id="alert"></p>
  </main>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const els = {
    antes: $('antes'), depois: $('depois'),
    execucoes: $('execucoes'), custo: $('custo'), jornada: $('jornada'),
    rManual: $('r-manual'), rIa: $('r-ia'), rReducao: $('r-reducao'),
    rEconomia: $('r-economia'), rDias: $('r-dias'), rValor: $('r-valor'),
    alert: $('alert')
  };

  // converte "0,25" ou "0.25" em número; ignora caracteres inválidos
  function num(v){
    if(v == null) return 0;
    const s = String(v).trim().replace(/\./g,'').replace(',', '.');
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }
  // formata número no padrão BR (ponto p/ milhar, vírgula p/ decimal)
  function fmt(n, dec){
    dec = dec == null ? 0 : dec;
    return n.toLocaleString('pt-BR', {minimumFractionDigits:dec, maximumFractionDigits:dec});
  }

  function calc(){
    const antes    = num(els.antes.value);
    const depois   = num(els.depois.value);
    const exec      = num(els.execucoes.value);
    const custo    = num(els.custo.value);
    const jornada  = num(els.jornada.value);

    const manual = antes * exec;            // h/ano gastas manualmente
    const comIA  = depois * exec;           // h/ano com IA
    const economia = Math.max(manual - comIA, 0);
    const reducao = manual > 0 ? (economia / manual) * 100 : 0;
    const dias    = jornada > 0 ? economia / jornada : 0;
    const valor   = economia * custo;

    els.rManual.textContent   = fmt(manual, manual % 1 ? 2 : 0) + ' h/ano';
    els.rIa.textContent       = fmt(comIA, comIA % 1 ? 2 : 0) + ' h/ano';
    els.rReducao.textContent  = fmt(reducao, reducao % 1 ? 1 : 0) + '%';
    els.rEconomia.textContent = fmt(economia, economia % 1 ? 2 : 0) + ' h/ano';
    els.rDias.textContent     = '≈ ' + fmt(Math.round(dias), 0) + ' dias úteis';
    els.rValor.textContent    = 'R$ ' + fmt(valor, valor % 1 ? 2 : 0) + '/ano';

    // aviso suave se "depois" >= "antes"
    if(depois >= antes && antes > 0){
      els.alert.textContent = '↳ O tempo "depois da IA" está maior ou igual ao "antes" — não há economia.';
    } else {
      els.alert.textContent = '';
    }
  }

  ['antes','depois','execucoes','custo','jornada'].forEach(id=>{
    els[id].addEventListener('input', calc);
  });

  calc();
})();
